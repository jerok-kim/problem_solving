[book]
title = "Problem Solving in Rust"
authors = ["jerok-kim"]
language = "kr"
multilingual = true
src = "src"

[rust]
edition = "2021"

[build]
build-dir = "docs"
create-missing = true
use-default-preprocessors = true
extra-watch-dirs = []

[output.html]
default-theme = "Rust"
mathjax-support = true
git-repository-url = "https://github.com/jerok-kim/problem_solving"
git-repository-icon = "fa-github"

[output.html.playground]
editable = true
copyable = true
line-numbers = true
runnable = true